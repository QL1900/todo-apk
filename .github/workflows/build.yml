name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK manually
        run: |
          mkdir -Force $env:USERPROFILE\android-sdk\cmdline-tools
          cd $env:USERPROFILE\android-sdk\cmdline-tools
          curl -L -o tools.zip https://dl.google.com/android/repository/commandlinetools-win-11076708_latest.zip
          tar -xf tools.zip
          ren cmdline-tools latest
          $env:ANDROID_HOME = "$env:USERPROFILE\android-sdk"
          $env:ANDROID_SDK_ROOT = "$env:USERPROFILE\android-sdk"
          cmd /c "echo y | $env:ANDROID_HOME\cmdline-tools\latest\bin\sdkmanager.bat --sdk_root=$env:ANDROID_HOME platform-tools `"build-tools;34.0.0`" `"platforms;android-34`""

      - name: Build debug APK
        shell: cmd
        run: |
          set ANDROID_HOME=%USERPROFILE%\android-sdk
          set ANDROID_SDK_ROOT=%USERPROFILE%\android-sdk
          echo sdk.dir=%ANDROID_HOME%> local.properties
          gradlew.bat assembleDebug --no-daemon --warning-mode=all 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TodoHub-debug
          path: app/build/outputs/apk/debug/app-debug.apk